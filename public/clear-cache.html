<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Clearing Cache...</title>
  <style>
    body { background: #050505; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: system-ui; }
    .container { text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(139,92,246,0.2); border-top: 3px solid #8b5cf6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p>Clearing cache &amp; reloading ORRA...</p>
  </div>
  <script>
    (async function() {
      try {
        if ('serviceWorker' in navigator) {
          var regs = await navigator.serviceWorker.getRegistrations();
          for (var i = 0; i < regs.length; i++) {
            await regs[i].unregister();
          }
        }
      } catch(e) {}

      try {
        if ('caches' in window) {
          var names = await caches.keys();
          for (var i = 0; i < names.length; i++) {
            await caches.delete(names[i]);
          }
        }
      } catch(e) {}

      try {
        localStorage.removeItem('aura-storage');
      } catch(e) {}

      try {
        sessionStorage.clear();
      } catch(e) {}

      // Small delay to ensure caches are fully deleted
      setTimeout(function() {
        window.location.replace('/?_fresh=' + Date.now());
      }, 500);
    })();
  </script>
</body>
</html>
