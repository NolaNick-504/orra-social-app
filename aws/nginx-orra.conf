# =============================================================================
# ORRA Social App - Nginx Reverse Proxy Configuration
# =============================================================================
# Install:
#   sudo cp nginx-orra.conf /etc/nginx/sites-available/orra
#   sudo ln -s /etc/nginx/sites-available/orra /etc/nginx/sites-enabled/orra
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL Setup (after DNS is configured):
#   sudo certbot --nginx -d orra.app -d www.orra.app
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP Server — Port 80
# After SSL is configured by Certbot, this block will redirect to HTTPS.
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;

    server_name orra.app *.orra.app;

    # -----------------------------------------------------------------------
    # Certbot will modify this block to redirect HTTP → HTTPS.
    # For initial setup, we serve the app directly on port 80.
    # -----------------------------------------------------------------------

    # Reverse proxy to the Next.js app running on port 3000
    location / {
        proxy_pass http://127.0.0.1:3000;

        # WebSocket upgrade support (needed for hot-reload, live features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable proxy caching for dynamic content
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache 1;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # -----------------------------------------------------------------------
    # Next.js Static Assets — Aggressive caching
    # Files in /_next/static/ have content-based hashes in filenames,
    # so they can be cached for a very long time.
    # -----------------------------------------------------------------------
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -----------------------------------------------------------------------
    # Public images — Moderate caching
    # -----------------------------------------------------------------------
    location /images/ {
        proxy_pass http://127.0.0.1:3000;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # -----------------------------------------------------------------------
    # Uploaded files — Moderate caching
    # -----------------------------------------------------------------------
    location /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # -----------------------------------------------------------------------
    # Music files — Moderate caching
    # -----------------------------------------------------------------------
    location /music/ {
        proxy_pass http://127.0.0.1:3000;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # -----------------------------------------------------------------------
    # API Routes — No caching, security headers
    # -----------------------------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:3000;

        # No caching for API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";

        # Security headers for API responses
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Proxy headers
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------------------
    # NextAuth routes — No caching
    # -----------------------------------------------------------------------
    location /api/auth/ {
        proxy_pass http://127.0.0.1:3000;

        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -----------------------------------------------------------------------
    # Gzip Compression
    # -----------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/opentype
        font/ttf
        font/woff
        font/woff2;

    # -----------------------------------------------------------------------
    # Upload size limit — 20MB for image uploads
    # -----------------------------------------------------------------------
    client_max_body_size 20M;

    # -----------------------------------------------------------------------
    # Security Headers (applied to all responses)
    # -----------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # -----------------------------------------------------------------------
    # Hide Nginx version for security
    # -----------------------------------------------------------------------
    server_tokens off;

    # -----------------------------------------------------------------------
    # Deny access to hidden files (e.g., .env, .git)
    # -----------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ---------------------------------------------------------------------------
# HTTPS Server — Port 443
# This block will be automatically generated by Certbot when you run:
#   sudo certbot --nginx -d orra.app -d www.orra.app
#
# After Certbot runs, the HTTP block above will be modified to redirect
# all traffic to this HTTPS block.
