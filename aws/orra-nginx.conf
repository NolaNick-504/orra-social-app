# =============================================================================
# ORRA Social App - AWS EC2 Nginx Configuration
# =============================================================================
# This file gets installed automatically by setup-ec2.sh
# Only edit this if you're adding a custom domain name or SSL (HTTPS)
# =============================================================================

server {
    listen 80;
    server_name _;

    # Maximum upload size (profile pics, covers, posts)
    client_max_body_size 50M;

    # Timeouts for large uploads
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
