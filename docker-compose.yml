# =============================================================================
# ORRA Social App - Docker Compose Configuration
# =============================================================================
# Usage:
#   docker compose up -d          # Start the app
#   docker compose logs -f        # View logs
#   docker compose down           # Stop the app
#   docker compose up --build -d  # Rebuild and restart
# =============================================================================

services:
  orra-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orra-social-app
    restart: always
    ports:
      - "3000:3000"

    # ---------------------------------------------------------------------------
    # Environment variables — loaded from .env.production file
    # ---------------------------------------------------------------------------
    env_file:
      - .env.production

    # ---------------------------------------------------------------------------
    # Volume mounts for persistent data
    # - db/               : SQLite database (survives container rebuilds)
    # - public/uploads/   : User-uploaded images
    # - founder-profile-backup.json : Founder data backup
    # ---------------------------------------------------------------------------
    volumes:
      - ./db:/app/db
      - ./public/uploads:/app/public/uploads
      - ./public/images:/app/public/images
      - ./public/music:/app/public/music
      - ./founder-profile-backup.json:/app/founder-profile-backup.json

    # ---------------------------------------------------------------------------
    # Health check — matches the Dockerfile HEALTHCHECK
    # ---------------------------------------------------------------------------
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # ---------------------------------------------------------------------------
    # Logging configuration — prevent log files from consuming disk
    # ---------------------------------------------------------------------------
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
