name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 18.118.22.101
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/orra
            git fetch origin
            git reset --hard origin/main
            rm -rf .next
            npm run build
            pm2 restart orra-server
            echo "DEPLOY COMPLETE at $(date)"
